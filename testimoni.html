.nav-item {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: #aaa;
  font-size: 12px;
  text-decoration: none;
  transition: color 0.3s ease, transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.nav-item svg {
  width: 22px;
  height: 22px;
  margin-bottom: 4px;
  fill: #aaa;
  transition: fill 0.3s ease, transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.nav-item.active::before {
  content: "";
  position: absolute;
  top: -12px; 
  left: 50%;
  transform: translateX(-50%);
  width: 24px;
  height: 3px;
  border-radius: 2px;
  background: #ea00ff;
  box-shadow: 0 0 6px #ea00ff;
  opacity: 0;
  animation: fadeSlide 0.4s ease forwards;
}

@keyframes fadeSlide {
  from {
    opacity: 0;
    transform: translateX(-50%) translateY(5px);
  }
  to {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
}

.nav-item.active,
.nav-item.active svg {
  color: #ea00ff;
  fill: #ea00ff;
}

.nav-item:hover {
  color: #fff;
  transform: scale(1.05); 
}

.nav-item:hover svg {
  fill: #fff;
  transform: translateY(-2px); 
}

.nav-item:active {
  transform: scale(0.95);
  opacity: 0.9;
}
