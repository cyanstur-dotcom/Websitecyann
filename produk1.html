<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Produk</title>
<style>
body {
  background: #000000;
  color: white;
  font-family: sans-serif;
  margin: 0;
  padding: 20px;
}
.slider-container { 
  position: relative; 
  max-width: 100%; 
  overflow: hidden; 
  border-radius: 15px; 
}
.slider { 
  display: flex; 
  transition: transform 0.5s ease; 
}
.slider img { 
  width: 100%; 
  flex-shrink: 0; 
  border-radius: 15px; 
  border: 2px solid #67676700; 
}
.desc {
  font-size: 14px;
  color: #ddd;
  margin: 12px 0;
  text-align: left;
}
.admin-profile {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 12px 0;
  background: rgba(255,255,255,0.05);
  padding: 8px;
  border-radius: 8px;
}
.admin-icon {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid #ff00f7;
}
.admin-name {
  font-size: 14px;
  font-weight: 600;
  color: #fff;
}
.badge {
  background: #ff00f7;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  position: absolute;
  top: -12px;
  right: 15px;
  color: #fff;
  font-weight: bold;
}
.prev, .next { 
  position: absolute; 
  top: 50%; 
  transform: translateY(-50%); 
  background: rgba(82, 82, 82, 0.466); 
  color: white; 
  border: none; 
  padding: 10px; 
  cursor: pointer; 
  border-radius: 50%; 
  z-index: 5; 
}
.prev { 
  left: 10px; } .next { 
    right: 10px; 
  }
.judul {
  margin-bottom: 4px; 
  color: #fff;
}

.price {
  font-size: 22px;
  font-weight: bold;
  color: #ff00f7;
  margin-bottom: 12px; 
}
.akun-card {
  position: relative;
  background: #000000;
  padding: 40px 20px 20px;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  text-align: center;
  margin: 20px auto;
  max-width: 400px;
}
.produk-card {
  position: relative;
  background: #000000;
  padding: 40px 20px 20px;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  text-align: center;
  margin: 20px auto;
  max-width: 400px;
  border: 2px solid #8000ff;
}
.btn { 
  display: block; 
  width: 100%; 
  padding: 12px; 
  margin-top: 10px; 
  border-radius: 10px; 
  border: none; 
  font-size: 16px; 
  cursor: pointer; 
  transition: 0.2s ease; 
}
.btn:active { 
  transform: scale(0.95); 
}
.buy { 
  background: #ff00d9; 
  color: rgb(255, 255, 255); 
  font-weight: bold; 
}
.wa { 
  background: #ff00d9; 
  color: white; 
  font-weight: bold; 
}
.back-btn {
  position: fixed;
  top: 16px;
  left: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #1c1c2e;
  color: #fff;
  text-decoration: none;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  transition: 0.3s;
  z-index: 999; 
}

.back-btn:hover {
  background: #333;
}
</style>
</head>

<body>

<div class="akun-card">
  <span class="badge">STOK AKUN READY!!</span>
  <div class="slider-container">
    <div class="slider" id="slider">
      <img src="Stok2.jpeg">
      <img src="Stok3.jpeg">
    </div>
    <button class="prev" onclick="prevSlide()">❮</button>
    <button class="next" onclick="nextSlide()">❯</button>
  </div>
       <h2 class="judul">Stok Sultan</h2>
  <div class="price">Rp 400.000</div>
  
  <p class="desc">
    Akun Free Fire Sultan Vault 650+, Senjata Allrof Incu Jibun, Semi old 7 Years Old
    Spek Centil, Ganteng, Evo 2 Ump old+Xm8 Max, Sg Loby Trompet.
  </p>

  <div class="admin-profile">
    <img src="admin2.jpeg" alt="Admin" class="admin-icon">
    <span class="admin-name">Stok - Cyan Store</span>
  </div>

  <button class="btn buy" onclick="beli()">Beli Sekarang</button>
  <button class="btn wa" onclick="tanya()">Tanya Admin</button>
<a href="index.html" class="back-btn">
  <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" width="20" height="20">
    <path d="M15 18l-6-6 6-6"/>
  </svg>
</a>
</div>
<script>
const produk = { nama: "Stok Sultan", harga: "Rp 400.000" };
const noAdmin = "6285725215326";


function beli() {
  window.location.href = "bayar1.html";
}

function tanya() {
  const text = `Halo admin, saya mau tanya tentang:\n${produk.nama}`;
  window.open(`https://wa.me/${noAdmin}?text=${encodeURIComponent(text)}`);
}

let currentIndex = 0;
const slider = document.getElementById("slider");
const slides = slider.querySelectorAll("img");
function showSlide(index) {
  if (index < 0) index = slides.length - 1;
  if (index >= slides.length) index = 0;
  currentIndex = index;
  slider.style.transform = `translateX(-${index * 100}%)`;
}
function prevSlide() { showSlide(currentIndex - 1); }
function nextSlide() { showSlide(currentIndex + 1); }
</script>

</body>
</html>
