<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Produk</title>
<style>
body {
  background: #0f0f1a;
  color: white;
  font-family: sans-serif;
  margin: 0;
  padding: 20px;
}
.slider-container { position: relative; max-width: 100%; overflow: hidden; border-radius: 15px; }
.slider { display: flex; transition: transform 0.5s ease; }
.slider img { width: 100%; flex-shrink: 0; border-radius: 15px; border: 2px solid #67676700; }
.badge { background: rgb(204, 0, 255); color: white; padding: 5px 12px; border-radius: 8px; font-size: 12px; position: absolute; top: -12px; right: 15px; }
.prev, .next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(82, 82, 82, 0.466); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 50%; z-index: 5; }
.prev { left: 10px; } .next { right: 10px; }
.produk-card { background: #1a1a2e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-top: 40px; position: relative; text-align: center; }
.price { color: #e9e9e9; font-size: 22px; font-weight: bold; margin: 10px 0; }
.btn { display: block; width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: none; font-size: 16px; cursor: pointer; transition: 0.2s ease; }
.btn:active { transform: scale(0.95); }
.buy { background: #ff00d9; color: rgb(255, 255, 255); font-weight: bold; }
.wa { background: rgb(3, 186, 218); color: white; font-weight: bold; }
.back-btn {
  position: fixed;
  top: 16px;
  left: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #1c1c2e;
  color: #fff;
  text-decoration: none;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  transition: 0.3s;
  z-index: 999; 
}

.back-btn:hover {
  background: #333;
}
</style>
</head>

<body>

<div class="produk-card">
  <span class="badge">BERGARANSI</span>
  <div class="slider-container">
    <div class="slider" id="slider">
      <img src="Stok.jpeg">
      <img src="Stok1.jpeg">
    </div>
    <button class="prev" onclick="prevSlide()">❮</button>
    <button class="next" onclick="nextSlide()">❯</button>
  </div>

  <h2 id="nama">Stok Pelajar</h2>
  <div class="price" id="harga">Rp 120.000</div>

  <button class="btn buy" onclick="beli()">Beli Sekarang</button>
  <button class="btn wa" onclick="tanya()">Tanya Admin</button>
 <a href="index.html" class="back-btn">
  <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" width="20" height="20">
    <path d="M15 18l-6-6 6-6"/>
  </svg>
</a>
</div>

<script>
const produk = { nama: "Stok Pelajar", harga: "Rp 120.000" };
const noAdmin = "6285725215326";


function beli() {
  window.location.href = "bayar.html";
}

function tanya() {
  const text = `Halo admin, saya mau tanya tentang:\n${produk.nama}`;
  window.open(`https://wa.me/${noAdmin}?text=${encodeURIComponent(text)}`);
}

let currentIndex = 0;
const slider = document.getElementById("slider");
const slides = slider.querySelectorAll("img");
function showSlide(index) {
  if (index < 0) index = slides.length - 1;
  if (index >= slides.length) index = 0;
  currentIndex = index;
  slider.style.transform = `translateX(-${index * 100}%)`;
}
function prevSlide() { showSlide(currentIndex - 1); }
function nextSlide() { showSlide(currentIndex + 1); }
</script>

</body>
</html>
